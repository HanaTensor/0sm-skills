# ============================================================
# create-folders.yml
# 用途: tex-sources/ 配下に論文番号フォルダを一括作成する
#
# 残すべき理由:
#   - 論文追加時（#48以降）は seq の数字を変えるだけで再利用可能
#   - 同様のフォルダ一括作成タスクに流用できる
#   - 将来の自動化（Zenodo同期等）の基盤として発展させられる
#
# 拡張方法:
#   論文が増えた場合 → `seq 1 47` を `seq 1 60` 等に変更して再実行
#
# warning について:
#   "Node.js 20 actions are deprecated" は actions/checkout@v4 の警告。
#   動作に影響なし。将来 @v5 に更新すれば解消。
# ============================================================

name: Create tex-sources folders
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create folders
        run: |
          for i in $(seq 1 47); do
            mkdir -p tex-sources/$i
            touch tex-sources/$i/.gitkeep
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tex-sources/
          git commit -m "chore: create tex-sources folders #1-#47"
          git push
